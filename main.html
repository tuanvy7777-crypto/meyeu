<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Mừng 8/3 Mẹ</title>

<audio id="bg-music" loop>
<source src="mp3.mp4" type="audio/mpeg">
</audio>

<style>
*{box-sizing:border-box}

body{
font-family:Arial;
background:#fff0f5;
text-align:center;
margin:0;
padding:20px;
-webkit-tap-highlight-color:transparent;
overflow-x:hidden;
}

/* Container chính */
.container{
display:flex;
justify-content:center;
align-items:flex-start;
gap:40px;
flex-wrap:wrap;
max-width:1200px;
margin:0 auto;
}

/* Menu quà */
.menu{
display:flex;
flex-direction:column;
gap:20px;
}

/* Card quà */
.card{
width:170px;
background:#fff;
border-radius:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
cursor:pointer;
transition:0.35s;
overflow:hidden;
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card p{
margin:10px 0 0 0;
font-size:15px;
font-weight:bold;
color:#ff1493;
}

.gift-number{
font-size:13px;
color:#555;
padding-bottom:10px;
}

/* Hover chỉ khi có chuột */
@media (hover:hover){
.card:hover{
transform:scale(1.06);
}
}

/* Calendar */
.calendar{
margin-top:20px;
width:100%;
max-width:420px;
}

.calendar table{
border-collapse:collapse;
width:100%;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

td{
padding:10px 6px;
border:1px solid #eee;
font-size:14px;
}

.highlight{
background:#ff69b4;
color:white;
border-radius:50%;
font-weight:bold;
}

/* Responsive */
@media(max-width:768px){

.container{
flex-direction:column;
align-items:center;
gap:30px;
}

.menu{
flex-direction:row;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.card{
width:45%;
max-width:200px;
}

}

@media(max-width:480px){

h1{
font-size:18px;
}

.card{
width:90%;
}

.calendar{
max-width:100%;
}

td{
font-size:13px;
padding:8px 4px;
}

}
</style>
</head>

<body>

<h1>🌸 Chúc Mừng ngày 8/3 ngày của Mẹ 🌸</h1>

<div class="container">

<div class="menu">

<div class="card" onclick="alert('8/3 này Con chúc mẹ luôn mạnh khỏe và hạnh phúc. Hiện tại con chỉ có thể làm những thứ này để chúc mẹ thôi. Sau này con làm ra tiền rồi sẽ bù đắp lại cho mẹ nè. ❤️')">
<img src="anh1.jpg">
<p>Món quà 1</p>
<div class="gift-number">💌 Lời chúc</div>
</div>

<div class="card" onclick="location.href='heart.html'">
<img src="anh2.jpg">
<p>Món quà 2</p>
<div class="gift-number">💖 Trái tim</div>
</div>

<div class="card" onclick="location.href='galaxy.html'">
<img src="anh3.jpg">
<p>Món quà 3</p>
<div class="gift-number">🌌 Kỷ niệm</div>
</div>

</div>

<div class="calendar">
<h3>Tháng 3 - 2026</h3>
<table>
<tr><td>CN</td><td>T2</td><td>T3</td><td>T4</td><td>T5</td><td>T6</td><td>T7</td></tr>
<tr><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td></tr>
<tr><td class="highlight">8</td><td>9</td><td>10</td><td>11</td><td>12</td><td>13</td><td>14</td></tr>
<tr><td>15</td><td>16</td><td>17</td><td>18</td><td>19</td><td>20</td><td>21</td></tr>
<tr><td>22</td><td>23</td><td>24</td><td>25</td><td>26</td><td>27</td><td>28</td></tr>
<tr><td>29</td><td>30</td><td>31</td><td></td><td></td><td></td><td></td></tr>
</table>
</div>

</div>

<script>

/* 🌸 Hoa rơi tối ưu mobile */
setInterval(()=>{
let flower=document.createElement("div");
flower.innerHTML="🌸";
flower.style.position="fixed";
flower.style.top="-30px";
flower.style.left=Math.random()*100+"vw";
flower.style.fontSize=16+Math.random()*18+"px";
flower.style.transition="7s linear";
flower.style.pointerEvents="none";
flower.style.zIndex="999";
document.body.appendChild(flower);

setTimeout(()=>{
flower.style.transform="translateY(110vh)";
flower.style.opacity=0;
},50);

setTimeout(()=>flower.remove(),7000);
},500);

/* 🔊 Phát nhạc khi người dùng chạm */
document.addEventListener("click",()=>{
document.getElementById("bg-music").play();
},{once:true});

</script>

</body>
</html>
