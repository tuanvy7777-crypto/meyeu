<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solid 3D Heart</title>
<!-- 🎵 NHẠC NỀN: đổi tên file tại dòng src -->
<audio id="bg-music" autoplay loop>
    <source src="mp2.mp4" type="audio/mpeg">
</audio>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ===== Điều khiển =====
let scale = 22;
let angleX = 0.6;
let angleY = 0;
let dragging = false;
let lastX,lastY;

canvas.onmousedown = e=>{
    dragging=true;
    lastX=e.clientX;
    lastY=e.clientY;
};
canvas.onmouseup = ()=> dragging=false;
canvas.onmousemove = e=>{
    if(dragging){
        angleY += (e.clientX-lastX)*0.01;
        angleX += (e.clientY-lastY)*0.01;
        lastX=e.clientX;
        lastY=e.clientY;
    }
};
canvas.onwheel = e=>{
    scale += e.deltaY * -0.01;
    scale = Math.max(10, Math.min(50, scale));
};

// ===== Công thức tim =====
function heart2D(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
    };
}

// ===== Tạo khối đặc thật sự =====
let points=[];
for(let i=0;i<9000;i++){
    let t=Math.random()*Math.PI*2;
    let boundary=heart2D(t);

    // lấy điểm ngẫu nhiên trong volume
    let u=Math.random();
    let x=boundary.x * Math.cbrt(u);
    let y=boundary.y * Math.cbrt(u);
    let maxDepth=10*(1-Math.abs(u));
    let z=(Math.random()-0.5)*maxDepth;

    points.push({x,y,z});
}

// ===== Xoay =====
function rotate(p){
    let y=p.y*Math.cos(angleX)-p.z*Math.sin(angleX);
    let z=p.y*Math.sin(angleX)+p.z*Math.cos(angleX);

    let x=p.x*Math.cos(angleY)-z*Math.sin(angleY);
    let z2=p.x*Math.sin(angleY)+z*Math.cos(angleY);

    return {x,y,z:z2};
}

// ===== Tim rơi =====
let falling=[];
for(let i=0;i<60;i++){
    falling.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*6+3,
        speed:Math.random()*1.5+0.5
    });
}

function drawMiniHeart(x,y,s){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x,y-s,x-s,y-s,x-s,y);
    ctx.bezierCurveTo(x-s,y+s,x,y+s*1.6,x,y+s*2);
    ctx.bezierCurveTo(x,y+s*1.6,x+s,y+s,x+s,y);
    ctx.bezierCurveTo(x+s,y-s,x,y-s,x,y);
    ctx.fill();
}

// ===== Vẽ =====
function draw(){
    ctx.fillStyle="rgba(0,0,0,0.35)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const light={x:0,y:0,z:40};

    points.forEach(p=>{
        let r=rotate(p);
        let perspective=700/(700+r.z);
        let x=r.x*scale*perspective+canvas.width/2;
        let y=-r.y*scale*perspective+canvas.height/2;

        // ánh sáng mềm
        let dx=r.x-light.x;
        let dy=r.y-light.y;
        let dz=r.z-light.z;
        let dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
        let brightness=1-dist/150;
        brightness=Math.max(0.25,brightness);

        let red=220+brightness*35;
        let green=30+brightness*40;
        let blue=70+brightness*50;

        ctx.beginPath();
        ctx.arc(x,y,3*perspective,0,Math.PI*2);
        ctx.fillStyle=`rgb(${red},${green},${blue})`;
        ctx.fill();
    });

    // tim rơi
    ctx.fillStyle="rgba(255,120,160,0.9)";
    falling.forEach(h=>{
        drawMiniHeart(h.x,h.y,h.size);
        h.y+=h.speed;
        if(h.y>canvas.height+20){
            h.y=-20;
            h.x=Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(draw);
}

draw();
// 🔊 Nếu trình duyệt chặn autoplay → phát khi người dùng click
    document.addEventListener("click", () => {
        const music = document.getElementById("bg-music");
        music.play();
    }, { once: true });
</script>
</script>

</body>
</html>
